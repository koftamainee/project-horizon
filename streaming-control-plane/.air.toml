root = "."
tmp_dir = "tmp"

[build]
  entrypoint = ["./tmp/scp"]
  cmd = "go build -o ./tmp/scp ./streaming-control-plane/cmd/streaming-control-plane/main.go"
  delay = 1000
  exclude_dir = ["tmp", "docs", "docker", "kernel", "vod-assembler", "transcoding-worker", "chat-satellite", ".git"]
  include_ext = ["go"]
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
