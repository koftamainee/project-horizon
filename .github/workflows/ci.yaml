name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Lint all modules
        run: make lint

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Buf lint
        run: buf lint
        working-directory: proto

      - name: Buf breaking
        run: buf breaking --against "git#branch=master"
        working-directory: proto

      - name: Check generated code is up to date
        run: |
          make proto
          git diff --exit-code gopkg/proto/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ kernel, streaming-control-plane, vod-assembler ]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}
