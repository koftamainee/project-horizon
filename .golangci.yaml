version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - goconst
    - gosec
    - misspell
    - unconvert
    - whitespace
    - revive
    - forbidigo
    - errchkjson
    - errorlint
    - nolintlint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: true
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (github.com/nats-io/nats.go/jetstream.Msg).Ack
        - (github.com/nats-io/nats.go/jetstream.Msg).Nak
        - (github.com/jackc/pgx/v5.Tx).Rollback

    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: Use structured logging (slog) instead of fmt.Print.
        - pattern: ^print(ln)?$

    goconst:
      min-occurrences: 3

    revive:
      rules:
        - name: exported
          disabled: true

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    generated: lax
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - goconst
          - gocritic
      - path: '\.pb\.go$'
        linters:
          - "*"
      - path: '\.pb\.gw\.go$'
        linters:
          - "*"

output:
  sort-order:
    - file
    - linter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
