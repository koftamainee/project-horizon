services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: horizon
      POSTGRES_USER: app_admin
      POSTGRES_PASSWORD: ${APP_ADMIN_PASSWORD}
      KERNEL_AUTH_PASSWORD: ${KERNEL_AUTH_PASSWORD}
      KERNEL_PROFILE_PASSWORD: ${KERNEL_PROFILE_PASSWORD}
      KERNEL_STREAM_PASSWORD: ${KERNEL_STREAM_PASSWORD}
      KERNEL_FOLLOW_PASSWORD: ${KERNEL_FOLLOW_PASSWORD}
      KERNEL_VOD_PASSWORD: ${KERNEL_VOD_PASSWORD}
      MIGRATOR_PASSWORD: ${MIGRATOR_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app_admin -d horizon" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql
      - ./docker/db/entrypoint-initdb.sh:/docker-entrypoint-initdb.d/entrypoint-initdb.sh
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql.template
    networks:
      - horizon

  message-queue:
    image: nats:2.14-alpine
    command: [ "-js" ]
    networks:
      - horizon

  migrator:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./kernel/migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://migrator:${MIGRATOR_PASSWORD}@db:5432/horizon?sslmode=disable", "up" ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horizon

  kernel:
    build:
      context: .
      dockerfile: kernel/Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
      message-queue:
        condition: service_started
    networks:
      - horizon

  api-gateway:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      kernel:
        condition: service_started
    networks:
      - horizon

volumes:
  db_data:

networks:
  horizon:
